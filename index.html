<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roofing Quote Calculator - Dark Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }
        #submittedInputs {
            background-color: #1e1e1e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            min-height: 20px;
            line-height: 1.6;
        }
        .section {
            display: none;
            background-color: #1e1e1e;
            padding: 25px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .section.active {
            display: block;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #bb86fc;
        }
        input, select {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            margin-top: 8px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #bb86fc;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            margin-right: 10px;
            background-color: #03dac6;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #018786;
        }
        .back-btn {
            background-color: #555;
            color: white;
        }
        .back-btn:hover {
            background-color: #777;
        }
        .drain-group {
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #252525;
        }
        .drain-button {
            background-color: #3700b3;
            color: white;
        }
        .drain-button:hover {
            background-color: #6200ee;
        }
        .clear-btn {
            background-color: #cf6679; /* Reddish */
            color: #000;
        }
        h1 { color: #bb86fc; margin-bottom: 10px; }
        h2 { color: #03dac6; margin-top: 0; }
        strong { color: #ffffff; }
    </style>
</head>
<body>

    <h1>Roofing Quote Calculator</h1>
    <div id="submittedInputs">Enter client info to begin...</div>

    <!-- Step 1: Client Info -->
    <div id="clientInfoSection" class="section active">
        <h2>Step 1: Client Info</h2>
        <label>Client Name:</label>
        <input type="text" id="clientName" placeholder="Full Name">
        <label>Phone Number:</label>
        <input type="tel" id="clientPhone" placeholder="(555) 555-5555">
        <br>
        <button onclick="navToField()">Next: Field Areas</button>
    </div>

    <!-- Step 2: Field Area -->
    <div id="fieldAreaSection" class="section">
        <h2>Step 2: Field Area</h2>
        <label>Length (ft):</label>
        <input type="number" id="fieldLength" placeholder="0">
        <label>Width (ft):</label>
        <input type="number" id="fieldWidth" placeholder="0">
        <br>
        <button class="back-btn" onclick="showSection('clientInfoSection')">Back</button>
        <button onclick="addFieldArea()">Add Another Area</button>
        <button onclick="navToWall()">Next Step</button>
    </div>

    <!-- Step 3: Walls and Curbs -->
    <div id="wallAndCurbSection" class="section">
        <h2>Step 3: Walls and Curbs</h2>
        <label>Height (ft):</label>
        <input type="number" id="wallHeight" placeholder="0">
        <label>Length (ft):</label>
        <input type="number" id="wallLength" placeholder="0">
        <br>
        <button class="back-btn" onclick="showSection('fieldAreaSection')">Back</button>
        <button onclick="addWallAndCurbArea()">Add Another Wall/Curb</button>
        <button onclick="navToDrain()">Next Step</button>
    </div>

    <!-- Step 4: Drains -->
    <div id="drainSection" class="section">
        <h2>Step 4: Drains</h2>
        <div class="drain-group">
            <label>3" Drain Option:</label>
            <select id="option3">
                <option value="">-- Choose 3" Action --</option>
                <option value="Replacement">Replacement</option>
                <option value="Retrofit">Retrofit</option>
            </select>
            <button class="drain-button" onclick="addDrain('3-Inch Drain', 'option3')">Add 3" Drain</button>
        </div>
        <div class="drain-group">
            <label>4" Drain Option:</label>
            <select id="option4">
                <option value="">-- Choose 4" Action --</option>
                <option value="Replacement">Replacement</option>
                <option value="Retrofit">Retrofit</option>
            </select>
            <button class="drain-button" onclick="addDrain('4-Inch Drain', 'option4')">Add 4" Drain</button>
        </div>
        <button class="back-btn" onclick="showSection('wallAndCurbSection')">Back</button>
        <button onclick="navToHeight()">Next Step</button>
    </div>

    <!-- Step 5: Height Hazard -->
    <div id="heightHazardSection" class="section">
        <h2>Step 5: Height Hazard</h2>
        <label>Building Height (Stories):</label>
        <input type="number" id="storyHeight" placeholder="1">
        <br>
        <button class="back-btn" onclick="showSection('drainSection')">Back</button>
        <button onclick="navToGutter()">Next Step</button>
    </div>

    <!-- Step 6: Gutters -->
    <div id="guttersSection" class="section">
        <h2>Step 6: Gutters</h2>
        <label>Gutter Length (ft):</label>
        <input type="number" id="gutterLength" placeholder="0">
        <br>
        <button class="back-btn" onclick="showSection('heightHazardSection')">Back</button>
        <button onclick="addGutter()">Add Gutter</button>
        <button onclick="doneGutters()">Finish & Email Quote</button>
        <button class="clear-btn" onclick="location.reload()">Clear All</button>
    </div>

    <script>
        let submittedData = {
            clientName: '', clientPhone: '',
            fieldAreas: [], wallAndCurbAreas: [],
            drains: [], heightHazard: '', gutters: []
        };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // NAVIGATION HANDLERS (Display updates only here)
        function navToField() {
            submittedData.clientName = document.getElementById('clientName').value;
            submittedData.clientPhone = document.getElementById('clientPhone').value;
            updateDisplay();
            showSection('fieldAreaSection');
        }

        function navToWall() {
            const l = parseFloat(document.getElementById('fieldLength').value);
            const w = parseFloat(document.getElementById('fieldWidth').value);
            if (!isNaN(l) && !isNaN(w)) { submittedData.fieldAreas.push({ length: l, width: w }); }
            updateDisplay();
            showSection('wallAndCurbSection');
        }

        function navToDrain() {
            const h = parseFloat(document.getElementById('wallHeight').value);
            const l = parseFloat(document.getElementById('wallLength').value);
            if (!isNaN(h) && !isNaN(l)) { submittedData.wallAndCurbAreas.push({ height: h, length: l }); }
            updateDisplay();
            showSection('drainSection');
        }

        function navToHeight() {
            updateDisplay();
            showSection('heightHazardSection');
        }

        function navToGutter() {
            submittedData.heightHazard = document.getElementById('storyHeight').value;
            updateDisplay();
            showSection('guttersSection');
        }

        // DATA ADDERS
        function addFieldArea() {
            const l = parseFloat(document.getElementById('fieldLength').value);
            const w = parseFloat(document.getElementById('fieldWidth').value);
            if (!isNaN(l) && !isNaN(w)) {
                submittedData.fieldAreas.push({ length: l, width: w });
                document.getElementById('fieldLength').value = '';
                document.getElementById('fieldWidth').value = '';
            }
        }

        function addWallAndCurbArea() {
            const h = parseFloat(document.getElementById('wallHeight').value);
            const l = parseFloat(document.getElementById('wallLength').value);
            if (!isNaN(h) && !isNaN(l)) {
                submittedData.wallAndCurbAreas.push({ height: h, length: l });
                document.getElementById('wallHeight').value = '';
                document.getElementById('wallLength').value = '';
            }
        }

        function addDrain(sizeLabel, selectId) {
            const opt = document.getElementById(selectId).value;
            if (opt) {
                submittedData.drains.push({ type: sizeLabel, option: opt });
                document.getElementById(selectId).value = ''; 
            } else { alert("Select option first."); }
        }

        function addGutter() {
            const gl = parseFloat(document.getElementById('gutterLength').value);
            if (!isNaN(gl)) {
                submittedData.gutters.push(gl);
                document.getElementById('gutterLength').value = '';
            }
        }

        function updateDisplay() {
            let html = `<strong>Client:</strong> ${submittedData.clientName || '---'} | ${submittedData.clientPhone || '---'}<br>`;
            let totalSqFt = 0;

            submittedData.fieldAreas.forEach((a, i) => {
                const sq = a.length * a.width;
                totalSqFt += sq;
                html += `Field ${i+1}: ${sq}sqft | `;
            });

            submittedData.wallAndCurbAreas.forEach((a, i) => {
                const sq = a.height * a.length;
                totalSqFt += sq;
                html += `Wall ${i+1}: ${sq}sqft | `;
            });

            submittedData.drains.forEach(d => html += `${d.type}(${d.option}) | `);
            if (submittedData.heightHazard) html += `Height: ${submittedData.heightHazard} Stories | `;
            submittedData.gutters.forEach(len => html += `Gutter: ${len}ft | `);

            if (totalSqFt > 0) html = `<strong>Total Area: ${totalSqFt.toLocaleString()} sq ft</strong><br>` + html;
            document.getElementById('submittedInputs').innerHTML = html;
        }

        function doneGutters() {
            const gl = parseFloat(document.getElementById('gutterLength').value);
            if (!isNaN(gl)) { submittedData.gutters.push(gl); }
            updateDisplay();
            
            const email = "roofmanmike@gmail.com";
            const subject = `Quote Request: ${submittedData.clientName}`;
            let body = `CLIENT INFO:\nName: ${submittedData.clientName}\nPhone: ${submittedData.clientPhone}\n\n`;
            let totalSqFt = 0;

            submittedData.fieldAreas.forEach((a, i) => {
                const sq = a.length * a.width; totalSqFt += sq;
                body += `Field Area ${i+1}: ${sq} sq ft (${a.length}x${a.width})\n`;
            });
            submittedData.wallAndCurbAreas.forEach((a, i) => {
                const sq = a.height * a.length; totalSqFt += sq;
                body += `Wall Area ${i+1}: ${sq} sq ft (${a.height}H x ${a.length}L)\n`;
            });

            body += `\nTOTAL ROOF AREA: ${totalSqFt} sq ft\n`;
            body += `\nDRAINS:\n` + (submittedData.drains.map(d => `- ${d.type}: ${d.option}`).join('\n') || 'None');
            body += `\n\nHEIGHT: ${submittedData.heightHazard} Stories\n\nGUTTERS:\n` + (submittedData.gutters.map(g => `- ${g} ft`).join('\n') || 'None');

            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }
    </script>
</body>
</html>
